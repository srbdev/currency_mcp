apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-mcp
spec:
  selector:
    matchLabels:
      app: currency-mcp
  template:
    metadata:
      labels:
        app: currency-mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/srbdev/currency-mcp:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: currency-mcp-service
spec:
  selector:
    app: currency-mcp
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: currency-mcp-ingress
spec:
  rules:
    - host: demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: currency-mcp-service
                port:
                  number: 8080
